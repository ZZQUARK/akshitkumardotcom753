kind = "web"
previewPath = "/thoughtsinknots/"
title = "Thoughts in Knots"
version = "1.0.0"
id = "artifacts/thoughts-in-knots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/thoughtsinknots/" ]
localPort = 22043

[services.development]
run = "pnpm --filter @workspace/thoughts-in-knots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thoughts-in-knots", "run", "build" ]
publicDir = "artifacts/thoughts-in-knots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22043"
BASE_PATH = "/thoughtsinknots/"
